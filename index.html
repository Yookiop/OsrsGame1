<!doctype html><html lang="en"><head><meta charset="utf-8"><title>OSRS Board Game</title>
<style>
:root{--bg:#1a1208;--gold:#c9a64e;--dice-bg:#f5e6d3;--dice-dot:#1a1208}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#d4c5a9;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;user-select:none}
#boardWrap{position:relative}
#board{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);width:min(88vh,88vw,700px);height:min(88vh,88vw,700px);aspect-ratio:1;gap:4px;background:#2a2014;border:3px solid #4a3828;border-radius:10px;padding:2px}
.space{background:#3a2e1e;border:1px solid #4a3828;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:all 0.2s;overflow:hidden;padding:28px 6px 28px 6px;position:relative}
.space:hover{filter:brightness(1.15)}
.space.active{box-shadow:0 0 18px var(--gold);border-color:var(--gold);z-index:10;animation:glowPulse 0.6s ease-in-out infinite alternate}
@keyframes glowPulse{from{box-shadow:0 0 10px var(--gold)}to{box-shadow:0 0 22px var(--gold)}}
.space .bar{width:100%;height:5px;flex-shrink:0;border-radius:2px}
.space .sn{font-size:1.5rem;font-weight:800;line-height:1.15;color:#f0e6d2;text-shadow:0 1px 3px rgba(0,0,0,0.8);margin-top:6px;margin-bottom:4px;padding:0 2px;word-break:break-word}
.space .sd{font-size:0.6rem;color:#aaa}
.space.start{background:#1a3a1a;border-color:#6ab04c}.space.start .sn.start-label{color:#ffd700;font-size:2.5rem}
.space-num{font-size:2.4rem;font-weight:900;color:#ffd700;text-shadow:0 0 6px rgba(255,215,0,0.5),0 1px 3px rgba(0,0,0,0.9);line-height:1;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:2}
.token{position:absolute;z-index:100;pointer-events:none;transform:translate(-50%,-50%);filter:drop-shadow(0 3px 4px rgba(0,0,0,0.9)) drop-shadow(0 0 10px rgba(255,215,0,0.6))}
.token svg{display:block;width:44px;height:44px;image-rendering:pixelated}
.boss-chip{font-size:0.55rem;color:#ccc;padding:2px 5px;border-radius:3px;background:#2a241c;cursor:default;transition:all 0.12s}
.boss-chip.boss-pick{background:#3a2a10;color:#ffd700;font-weight:900;box-shadow:0 0 8px rgba(255,215,0,0.4)}
/* Slot Machine Overlay */
#slotOverlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1000;flex-direction:column;align-items:center;justify-content:center}
.slot-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85)}
.slot-window{position:relative;z-index:1;width:90vw;max-width:600px;text-align:center}
.slot-title{font-size:1.5rem;font-weight:900;color:var(--gold);margin-bottom:16px;text-shadow:0 0 12px rgba(201,166,78,0.5);animation:slotPulse 1s ease-in-out infinite}
@keyframes slotPulse{0%,100%{opacity:0.7}50%{opacity:1}}
.slot-track-wrap{overflow:hidden;border-radius:12px;background:#1a1208;border:3px solid #4a3828;padding:8px 0;margin-bottom:4px}
.slot-track{display:flex;gap:8px;will-change:transform}
.slot-card{flex-shrink:0;width:125px;height:125px;background:#2a2014;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid #3a2e1e;overflow:hidden}
.slot-card img{width:90%;height:90%;object-fit:contain;image-rendering:pixelated}
.slot-frame{position:relative;height:30px}
.slot-frame-arrow{position:absolute;top:0;left:50%;transform:translateX(-50%);color:var(--gold);font-size:1.5rem;animation:arrowBounce 0.5s ease-in-out infinite alternate}
@keyframes arrowBounce{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(-6px)}}
#diceArea{display:flex;align-items:center;gap:12px;width:144px;flex-shrink:0}
#diceResult{font-size:60px;color:var(--gold);font-weight:900;width:140px;flex-shrink:0;text-align:center;line-height:1}
.dice{width:66px;height:66px;background:var(--dice-bg);border-radius:12px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:7px;box-shadow:3px 3px 8px rgba(0,0,0,0.6);transition:transform 0.06s,box-shadow 0.06s}
.dice.rolling{animation:diceShake 0.18s ease-in-out infinite}
@keyframes diceShake{0%{transform:rotate(-8deg) translate(-2px,-2px)}25%{transform:rotate(6deg) translate(2px,1px)}50%{transform:rotate(-5deg) translate(-1px,2px)}75%{transform:rotate(7deg) translate(1px,-1px)}100%{transform:rotate(-8deg) translate(-2px,-2px)}}
.dice.landed{animation:diceLand 0.4s ease-out}
@keyframes diceLand{0%{transform:scale(1.15);box-shadow:0 0 20px var(--gold)}100%{transform:scale(1);box-shadow:3px 3px 8px rgba(0,0,0,0.6)}}
.dice .dot{width:13px;height:13px;background:var(--dice-dot);border-radius:50%;place-self:center;visibility:hidden}
#controls{display:flex;align-items:center;gap:12px}
.btn{font-size:1.4rem;padding:12px 18px;font-weight:800;border:none;border-radius:8px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.btn:hover{filter:brightness(1.2);transform:translateY(-2px)}
.btn:active{transform:scale(0.96)}
.btn:disabled{opacity:0.3;cursor:not-allowed;filter:none;transform:none}
.btn-roll{background:var(--gold);color:#1a1208;font-size:1.4rem}
.btn-reset{background:#4a2820;color:#ff6b6b;font-size:1rem;padding:12px 16px}
#info{text-align:center;font-size:0.8rem;color:#aaa;min-height:22px}
#bossResult{font-size:1.1rem;text-align:center;padding:4px 12px;background:#2a241c;border-radius:6px}
.rb-border{position:relative;z-index:0;display:inline-block;padding:8px 16px;border-radius:8px}
@property --rb{ syntax:'<angle>'; initial-value:0deg; inherits:false }
.rb-border::before{content:'';position:absolute;inset:-2px;border-radius:10px;background:conic-gradient(from var(--rb),#ff0000,#ff8800,#ffff00,#00ff00,#00ffff,#0088ff,#8800ff,#ff0000);animation:rainbowFlow 2s linear infinite;z-index:-1;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;padding:2px}
@keyframes rainbowFlow{to{--rb:360deg}}
</style></head><body>

<div id="topBar" style="display:grid;grid-template-columns:repeat(4,1fr);width:min(88vh,88vw,700px);align-items:center">
<div style="grid-column:1/3;display:flex;align-items:center;gap:4px;justify-content:flex-start;padding-left:6px">
<div id="diceArea">
  <div class="dice" id="d1"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="dice" id="d2"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<div id="diceResult"></div>
</div>
<div style="grid-column:3/5;display:flex;align-items:center;gap:8px;justify-content:flex-end;padding-right:4px">
<div id="controls">
  <button class="btn btn-roll" id="btn1" onclick="doRoll1()"><span style="font-size:2.4rem;vertical-align:middle;">🎲</span> ROLL PREPARATION REGION</button>
  <button class="btn btn-reset" id="btnReset" onclick="resetGame()" style="visibility:hidden;">🔄 Again</button>
</div>
</div>
</div>

<div id="boardWrap"><div id="board"></div></div>

<script src="static/board-data.js"></script>
<script src="static/game.js"></script>
<script src="static/ui.js"></script>
</body></html>
